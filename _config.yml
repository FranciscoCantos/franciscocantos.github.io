    content: | # this will include new lines to allow paragraphs
      **Languages & Frameworks:** <mark>Swift</mark>, <mark>SwiftUI</mark>, <mark>UIKit</mark>, <mark>Objective-C</mark>, <mark>Combine</mark>, <mark>RxSwift</mark>

      **Architecture:** <mark>MVVM</mark>, <mark>Clean Architecture</mark>, <mark>VIPER</mark>, <mark>Redux</mark>, <mark>ReSwift</mark>, Modular Architecture

      **Concurrency:** Swift Concurrency, <mark>async/await</mark>, Tasks, actors, Sendable-aware development

      **Networking & Data:** REST APIs, <mark>URLSession</mark>, <mark>Core Data</mark>, <mark>UserDefaults</mark>

      **Testing & Quality:** <mark>XCTest</mark>, Unit Testing, Integration Testing, UI Testing, <mark>SwiftLint</mark>, <mark>SonarQube</mark>, <mark>Kiuwan</mark>

      **CI/CD & Monitoring:** <mark>Jenkins</mark>, <mark>Xcode Cloud</mark>, <mark>Firebase Analytics</mark>, <mark>Firebase Crashlytics</mark>

      **Tools:** <mark>GitHub</mark>, <mark>Jira</mark>, <mark>Azure DevOps</mark>, <mark>BrowserStack</mark>, <mark>Figma</mark>, <mark>Lokalise</mark>

