          Use <mark>Swift</mark>, <mark>SwiftUI</mark>, <mark>Combine</mark> and <mark>Core Data</mark> in a Clean <mark>MVVM</mark> architecture to build maintainable, scalable and testable solutions.

          Improve user flows, app performance and accessibility while keeping a strong product-quality mindset. Work with unit tests, integration tests and UI tests to increase release confidence and reduce regressions.

          Collaborate with product, design and QA teams and contribute to CI/CD workflows with <mark>Jenkins</mark>, <mark>BrowserStack</mark>, <mark>Figma</mark>, <mark>Firebase</mark> and <mark>Crashlytics</mark>.

