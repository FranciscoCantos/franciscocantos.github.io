about_content: | # this will include new lines to allow paragraphs
  Senior iOS Developer with 10+ years of experience building, evolving and maintaining native iOS applications in retail, telecom and digital product environments. Strong background in <mark>Swift</mark>, <mark>SwiftUI</mark>, <mark>UIKit</mark> and scalable mobile architectures, with hands-on experience in Clean Architecture, MVVM, VIPER and Redux-based flows.

  Focused on performance, maintainability, testing, accessibility and product quality, with proven experience collaborating closely with product, design and QA teams in production apps.
